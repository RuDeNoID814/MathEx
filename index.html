<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MathEx">
    <meta name="theme-color" content="#0b0b0e">
    <title>MathEx</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css?v=2">
    <link rel="manifest" href="manifest.json">
    <script>
        MathJax = {
            tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
            options: { skipHtmlTags: ['script','noscript','style','textarea'] }
        };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
</head>
<body>
<div class="header">
    <div class="header-top">
        <div class="logo">MathEx</div>
        <div class="counter" id="counter"></div>
    </div>
    <div class="search-wrap" id="searchWrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" type="search" placeholder="Поиск по вопросам..." id="searchInput" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="clear-btn" id="clearBtn">✕</button>
    </div>
</div>

<div class="sem-row" id="semRow"></div>
<div class="tags-row" id="tagsRow"></div>
<div class="list" id="list"></div>
<div class="spacer" id="spacer"></div>

<script src="src/js/data.js"></script>
<script src="src/js/data-2sem.js"></script>
<script src="src/js/graphs.js"></script>
<script src="src/js/app.js"></script>
</body>
</html>
